name: pull-request
on: pull_request

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: pnpm install
        run: pnpm install
      - name: lint
        run: pnpm run lint
      - name: format
        run: pnpm run format
